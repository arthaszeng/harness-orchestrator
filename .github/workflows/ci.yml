name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys
          whl = next(p for p in __import__('pathlib').Path('dist').iterdir() if p.suffix == '.whl')
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              agents = [n for n in names if 'agents/' in n and n.endswith(('.toml', '.md'))]
              templates = [n for n in names if 'templates/' in n]
              print(f'Agents: {len(agents)}, Templates: {len(templates)}, Total: {len(names)}')
              assert len(agents) >= 16, f'Expected >=16 agent files, got {len(agents)}'
              assert len(templates) >= 20, f'Expected >=20 template files, got {len(templates)}'
              print('Wheel contents verified.')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
