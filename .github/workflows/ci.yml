name: CI

# DISABLED: GitHub Actions minutes exhausted — running CI locally via ./scripts/ci.sh
# To re-enable: remove the `if: false` on the jobs below and restore original `on:` triggers
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys
          whl = next(p for p in __import__('pathlib').Path('dist').iterdir() if p.suffix == '.whl')
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              templates = [n for n in names if 'templates/' in n]
              py_files = [n for n in names if n.endswith('.py')]
              print(f'Templates: {len(templates)}, Python: {len(py_files)}, Total: {len(names)}')
              assert len(templates) >= 20, f'Expected >=20 template files, got {len(templates)}'
              assert len(py_files) >= 15, f'Expected >=15 Python files, got {len(py_files)}'
              print('Wheel contents verified.')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
